{{define "index.html"}}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes — Localitas</title>
    <base href="{{.BasePath}}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 280px;
            --sidebar-min-width: 280px;
            --sidebar-max-width: 400px;
            --color-bg-base: #fcfbfe;
            --color-bg-main: #f8f7fc;
            --color-bg-elevated: #f0eef7;
            --color-bg-footer: #e8e5f2;
            --color-text-primary: #1a1625;
            --color-text-secondary: #4a3f5c;
            --color-glass-base: rgba(255, 255, 255, 0.75);
            --color-glass-border: rgba(139, 117, 169, 0.35);
            --color-accent: #7d6b96;
            --color-accent-hover: #6b5a82;
            --color-accent-shadow: rgba(142, 122, 168, 0.3);
            --color-success: #a8d5ba;
            --color-error: #e88b8b;
            --color-warning: #f5e6a8;
            --shadow: 0 4px 16px rgba(139, 117, 169, 0.08);
            --shadow-elevated: 0 8px 32px rgba(139, 117, 169, 0.12);
        }

        [data-theme="dark"] {
            --color-bg-base: #120f1a;
            --color-bg-main: #1a1625;
            --color-bg-elevated: #221b2e;
            --color-bg-footer: #2a2438;
            --color-text-primary: #e8e4f0;
            --color-text-secondary: #b3a8c8;
            --color-glass-base: rgba(37, 31, 53, 0.85);
            --color-glass-border: rgba(184, 164, 212, 0.15);
            --color-accent: #c5b3e0;
            --color-accent-hover: #d5c7ea;
            --color-accent-shadow: rgba(197, 179, 224, 0.3);
            --color-success: #b8e6ca;
            --color-error: #ff9999;
            --color-warning: #fff0c2;
            --shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
            --shadow-elevated: 0 12px 48px rgba(0, 0, 0, 0.6);
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--color-bg-base);
            color: var(--color-text-primary);
            display: flex;
            flex-direction: column;
        }

        .glass-panel {
            background-color: var(--color-glass-base);
            backdrop-filter: blur(28px) saturate(150%);
            border: 1.5px solid var(--color-glass-border);
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .glass-panel:hover {
            box-shadow: var(--shadow-elevated);
            border-color: var(--color-accent);
        }

        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-min-width);
            max-width: var(--sidebar-max-width);
            flex-shrink: 0;
        }

        .sidebar.hidden { transform: translateX(-100%); }

        .sidebar-glass {
            background-color: var(--color-glass-base);
            backdrop-filter: blur(32px) saturate(160%);
            border-right: 1px solid var(--color-glass-border);
        }

        .sidebar-header {
            height: 56px; min-height: 56px;
            padding: 0 1rem;
            display: flex; align-items: center;
            border-bottom: 1px solid var(--color-glass-border);
        }

        .sidebar-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem; border-radius: 0.5rem;
            cursor: pointer; transition: all 0.2s;
            color: var(--color-text-secondary); font-size: 0.875rem;
        }

        .sidebar-item:hover { background: rgba(142, 122, 168, 0.15); color: var(--color-text-primary); }

        .sidebar-item.active-purple { background: rgba(168, 85, 247, 0.15); color: var(--color-text-primary); }

        .search-input {
            width: 100%; padding: 0.5rem 0.75rem;
            background: var(--color-glass-base);
            border: 1px solid var(--color-glass-border);
            border-radius: 0.5rem;
            color: var(--color-text-primary);
            font-size: 0.875rem;
        }

        .search-input:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.15); }

        .markdown-editor {
            width: 100%; flex: 1;
            padding: 1rem;
            background: var(--color-glass-base);
            border: none; border-top: 1px solid var(--color-glass-border);
            color: var(--color-text-primary);
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px; line-height: 1.6;
            resize: none; white-space: pre-wrap; overflow-x: auto;
        }

        .markdown-editor:focus { outline: none; }

        .note-title-input {
            background: transparent; border: none; outline: none;
            font-size: 1rem; font-weight: 600;
            color: var(--color-text-primary);
            padding: 0 0.5rem;
        }

        .note-title-input::placeholder { color: var(--color-text-secondary); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 0.5rem;
            border: 1px solid var(--color-glass-border);
            background: var(--color-glass-base);
            color: var(--color-text-primary);
            cursor: pointer; font-size: 0.875rem; font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover { background: rgba(142, 122, 168, 0.15); border-color: var(--color-accent); }

        .btn-primary { background: var(--color-accent); border-color: var(--color-accent); color: var(--color-bg-elevated); }
        .btn-primary:hover { background: var(--color-accent-hover); }

        .btn-danger { background: #ef4444; color: white; border-color: #ef4444; }
        .btn-danger:hover { background: #dc2626; }

        .header-btn {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            background: var(--color-glass-base);
            border: 1px solid var(--color-glass-border);
            border-radius: 0.5rem;
            color: var(--color-text-secondary);
            cursor: pointer; font-size: 0.875rem; transition: all 0.2s;
        }

        .header-btn:hover { background: rgba(142, 122, 168, 0.15); color: var(--color-text-primary); }

        .menu-btn {
            padding: 0.5rem; background: transparent; border: none;
            border-radius: 0.375rem; color: var(--color-text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .menu-btn:hover { background: var(--color-glass-base); color: var(--color-text-primary); }

        .main-widget-header {
            height: 56px; min-height: 56px;
            padding: 0 1rem 0 0.5rem;
            display: flex; gap: 0.75rem; align-items: center;
            flex-shrink: 0;
            background: var(--color-glass-base);
            border-bottom: 1px solid var(--color-glass-border);
        }

        .resize-handle {
            position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
            cursor: col-resize; z-index: 10;
        }

        .resize-handle:hover { background-color: var(--color-accent); }

        .me-badge {
            display: inline-flex; align-items: center;
            padding: 0.125rem 0.375rem; font-size: 0.625rem;
            font-weight: 600; text-transform: uppercase;
            background: var(--color-accent); color: var(--color-bg-base);
            border-radius: 0.25rem; margin-left: 0.375rem;
        }

        .background-content {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, var(--color-bg-elevated), var(--color-bg-base) 90%);
            z-index: -1;
        }

        .glass-scrollbar::-webkit-scrollbar { width: 6px; }
        .glass-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .glass-scrollbar::-webkit-scrollbar-thumb { background: var(--color-text-secondary); opacity: 0.3; border-radius: 3px; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; }
        .empty-icon { width: 64px; height: 64px; color: var(--color-text-secondary); margin-bottom: 1rem; }
        .empty-state h2 { color: var(--color-text-primary); font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
        .empty-state p { color: var(--color-text-secondary); margin-bottom: 1.5rem; }

        .error-message { background: var(--color-error); color: white; padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; }
        .success-message { background: var(--color-success); color: #0d3620; padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; }

        .shortcut-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
        .shortcut-overlay.visible { display: flex; align-items: flex-end; }
        .shortcut-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .shortcut-panel { position: relative; width: 100%; background: var(--color-glass-base); border-top: 1.5px solid var(--color-glass-border); backdrop-filter: blur(28px); padding: 1.5rem 2rem 2rem; animation: slideUp 0.25s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .shortcut-columns { display: flex; gap: 0; margin-top: 1.25rem; }
        .shortcut-col { flex: 1; padding: 0 1.5rem; }
        .shortcut-col:not(:last-child) { border-right: 1px solid var(--color-glass-border); }
        .shortcut-col:first-child { padding-left: 0; }
        .shortcut-col:last-child { padding-right: 0; }
        @media (max-width: 640px) {
            .shortcut-columns { flex-direction: column; gap: 1rem; }
            .shortcut-col { padding: 0 !important; }
            .shortcut-col:not(:last-child) { border-right: none; border-bottom: 1px solid var(--color-glass-border); padding-bottom: 1rem !important; }
        }
        .shortcut-col-title { font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-accent); margin-bottom: 0.75rem; }
        .shortcut-item { display: flex; align-items: center; justify-content: space-between; padding: 0.375rem 0; }
        .shortcut-label { font-size: 0.8125rem; color: var(--color-text-secondary); }
        .shortcut-keys { display: flex; gap: 0.25rem; }
        .kbd { display: inline-flex; align-items: center; justify-content: center; min-width: 1.5rem; height: 1.375rem; padding: 0 0.375rem; font-size: 0.6875rem; font-family: inherit; font-weight: 600; color: var(--color-text-primary); background: var(--color-bg-elevated); border: 1px solid var(--color-glass-border); border-radius: 0.25rem; box-shadow: 0 1px 0 var(--color-glass-border); }

    </style>
</head>
<body>
    <div class="background-content"></div>

    <div style="flex: 1; display: flex; overflow: hidden; min-height: 0;">
        <div id="notes-sidebar" class="sidebar sidebar-glass flex flex-col" style="position: relative;">
            <div class="resize-handle" id="resize-handle"></div>
            <a onclick="fetch('/apps/notes/help?format=html',{headers:typeof getGlobalAuthHeaders==='function'?getGlobalAuthHeaders():{}}).then(r=>r.text()).then(h=>{document.getElementById('main-widget-container').innerHTML=h})" style="display:flex; align-items:center; gap:0.75rem; height:56px; min-height:56px; padding:0 1rem; border-bottom:1px solid var(--color-glass-border); color:var(--color-text-secondary); text-decoration:none; font-size:0.875rem; font-weight:500; flex-shrink:0; border-radius:0; cursor:pointer;">
                <i data-lucide="book-open" style="width:18px; height:18px;"></i>
                Documentation
            </a>
            <div class="sidebar-header justify-between">
                <h2 class="text-base font-semibold text-primary">Notes</h2>
                <button class="header-btn"
                        hx-post="partials/create"
                        hx-target="#main-widget-container"
                        hx-swap="innerHTML"
                        title="New Note">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto glass-scrollbar p-2">
                <div class="mb-2">
                    <input type="text" id="search-input" name="query"
                           class="search-input" placeholder="Search notes..."
                           hx-post="partials/search"
                           hx-trigger="input changed delay:300ms, keyup[key=='Enter']"
                           hx-target="#notes-sidebar-list"
                           hx-swap="outerHTML">
                </div>
                <div id="notes-sidebar-list"
                     hx-get="partials/sidebar"
                     hx-trigger="load"
                     hx-swap="outerHTML">
                    <div class="text-center py-4 text-secondary">Loading...</div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col" id="main-widget-container" style="min-height: 0;"
             hx-get="{{if .SelectedID}}partials/editor/{{.SelectedID}}{{else}}partials/empty{{end}}"
             hx-trigger="load"
             hx-swap="innerHTML">
        </div>
    </div>

    <script>
        (function() {
            const html = document.documentElement;
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const saved = localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light');
            html.setAttribute('data-theme', saved);

            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'theme-change') {
                    html.setAttribute('data-theme', e.data.theme);
                }
            });
        })();

        document.addEventListener('DOMContentLoaded', function() { lucide.createIcons(); });

        const sidebar = document.getElementById('notes-sidebar');
        const toggleBtn = document.getElementById('toggle-sidebar');
        const resizeHandle = document.getElementById('resize-handle');

        if (toggleBtn && sidebar) {
            toggleBtn.addEventListener('click', () => sidebar.classList.toggle('hidden'));
        }

        let isResizing = false, startX, startWidth;
        if (resizeHandle) {
            resizeHandle.addEventListener('mousedown', (e) => {
                isResizing = true; startX = e.clientX;
                startWidth = parseInt(getComputedStyle(sidebar).width, 10);
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const w = startWidth + (e.clientX - startX);
                if (w >= 200 && w <= 500) sidebar.style.width = w + 'px';
            });
            document.addEventListener('mouseup', () => {
                if (isResizing) { isResizing = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; }
            });
        }

        document.body.addEventListener('htmx:afterSwap', function() {
            lucide.createIcons();
        });

        document.body.addEventListener('click', function(e) {
            const item = e.target.closest('.sidebar-item[hx-get]');
            if (!item) return;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active-purple'));
            item.classList.add('active-purple');
        });

        document.body.addEventListener('htmx:pushedIntoHistory', function(e) {
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'localitas-navigate',
                    search: window.location.search
                }, '*');
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const selectedId = urlParams.get('id');
        if (selectedId) {
            setTimeout(function() {
                const item = document.querySelector('[hx-get="partials/editor/' + selectedId + '"]');
                if (item) {
                    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active-purple'));
                    item.classList.add('active-purple');
                }
            }, 500);
        }

        document.body.addEventListener('htmx:confirm', function(e) {
            const msg = e.target.getAttribute('data-confirm-message');
            if (msg) {
                e.preventDefault();
                window.confirmModal.show({title:'Confirm', message:msg, confirmText:'Delete', confirmClass:'btn-danger'}).then(function(confirmed) {
                    if (confirmed) e.detail.issueRequest();
                });
            }
        });

        document.addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 's') {
                e.preventDefault();
                var saveBtn = document.querySelector('[hx-post*="/partials/save/"]');
                if (saveBtn) htmx.trigger(saveBtn, 'click');
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                e.preventDefault();
                var runBtn = document.querySelector('[hx-post*="/partials/execute/"]');
                if (runBtn) htmx.trigger(runBtn, 'click');
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
                e.preventDefault();
                var createBtn = document.querySelector('[hx-post*="/partials/create"]');
                if (createBtn) htmx.trigger(createBtn, 'click');
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                var searchInput = document.getElementById('search-input');
                if (searchInput) searchInput.focus();
            }
            if (e.key === 'Escape') {
                var overlay = document.getElementById('shortcut-overlay');
                if (overlay && overlay.classList.contains('visible')) {
                    overlay.classList.remove('visible');
                }
            }
            if (e.key === '?' && !e.metaKey && !e.ctrlKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                toggleShortcutHelp();
            }
        });

        function toggleShortcutHelp() {
            var overlay = document.getElementById('shortcut-overlay');
            if (overlay) overlay.classList.toggle('visible');
        }
    </script>

<div id="shortcut-overlay" class="shortcut-overlay">
    <div class="shortcut-backdrop" onclick="toggleShortcutHelp()"></div>
    <div class="shortcut-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-size: 1rem; font-weight: 600; color: var(--color-text-primary); margin: 0;">Keyboard Shortcuts</h3>
            <button class="menu-btn" onclick="toggleShortcutHelp()"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div class="shortcut-columns">
            <div class="shortcut-col">
                <div class="shortcut-col-title">Editing</div>
                <div class="shortcut-item"><span class="shortcut-label">Save note</span><span class="shortcut-keys"><span class="kbd">⌘</span><span class="kbd">S</span></span></div>
                <div class="shortcut-item"><span class="shortcut-label">Run all code blocks</span><span class="shortcut-keys"><span class="kbd">⌘</span><span class="kbd">↵</span></span></div>
            </div>
            <div class="shortcut-col">
                <div class="shortcut-col-title">Navigation</div>
                <div class="shortcut-item"><span class="shortcut-label">New note</span><span class="shortcut-keys"><span class="kbd">⌘</span><span class="kbd">N</span></span></div>
                <div class="shortcut-item"><span class="shortcut-label">Search notes</span><span class="shortcut-keys"><span class="kbd">⌘</span><span class="kbd">K</span></span></div>
            </div>
            <div class="shortcut-col">
                <div class="shortcut-col-title">General</div>
                <div class="shortcut-item"><span class="shortcut-label">Show shortcuts</span><span class="shortcut-keys"><span class="kbd">?</span></span></div>
                <div class="shortcut-item"><span class="shortcut-label">Close panel</span><span class="shortcut-keys"><span class="kbd">Esc</span></span></div>
            </div>
        </div>
    </div>
</div>

<div id="confirm-modal" style="display:none;position:fixed;inset:0;z-index:100;">
    <div id="confirm-modal-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);"></div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:1rem;">
        <div style="background:var(--color-glass-base,#fff);border:1.5px solid var(--color-glass-border,rgba(139,117,169,0.35));border-radius:1rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
            <div style="padding:1.5rem;">
                <h3 id="confirm-modal-title" style="font-size:1.125rem;font-weight:600;color:var(--color-text-primary,#1a1625);margin:0 0 0.5rem 0;">Confirm</h3>
                <p id="confirm-modal-message" style="font-size:0.875rem;color:var(--color-text-secondary,#4a3f5c);margin:0 0 1.5rem 0;">Are you sure?</p>
                <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
                    <button id="confirm-modal-cancel" style="padding:0.5rem 1rem;border-radius:0.5rem;font-size:0.8125rem;font-weight:500;border:1px solid var(--color-glass-border,#ddd);background:var(--color-glass-base,#fff);color:var(--color-text-primary,#333);cursor:pointer;">Cancel</button>
                    <button id="confirm-modal-confirm" style="padding:0.5rem 1rem;border-radius:0.5rem;font-size:0.8125rem;font-weight:500;border:none;background:var(--color-error,#e88b8b);color:white;cursor:pointer;">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
window.confirmModal={show:function(opts){return new Promise(function(resolve){
    var m=document.getElementById('confirm-modal');
    var bd=document.getElementById('confirm-modal-backdrop');
    document.getElementById('confirm-modal-title').textContent=opts.title||'Confirm';
    document.getElementById('confirm-modal-message').textContent=opts.message||'Are you sure?';
    var cb=document.getElementById('confirm-modal-confirm');
    cb.textContent=opts.confirmText||'Delete';
    cb.style.background=(opts.confirmClass==='btn-primary')?'var(--color-accent,#7d6b96)':'var(--color-error,#e88b8b)';
    m.style.display='block';
    function close(v){m.style.display='none';resolve(v);bd.onclick=null;document.getElementById('confirm-modal-cancel').onclick=null;cb.onclick=null;}
    bd.onclick=function(){close(false);};
    document.getElementById('confirm-modal-cancel').onclick=function(){close(false);};
    cb.onclick=function(){close(true);};
});}};
</script>
</body>
</html>
{{end}}
